kind = "web"
previewPath = "/"
title = "بنها العقارية"
version = "1.0.0"
id = "artifacts/banha-realestate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24749

[services.development]
run = "pnpm --filter @workspace/banha-realestate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/banha-realestate", "run", "build" ]
publicDir = "artifacts/banha-realestate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24749"
BASE_PATH = "/"
